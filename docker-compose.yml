# 迁移后只剩 searxng（自建元搜索）。主服务（craft-server）+ mihomo 均已转原生 systemd：
#   craft-agent.service、mihomo.service（部署见 scripts/deploy.sh / quick-deploy.sh）。
# 这份只管 searxng 一个容器，发布到宿主回环 127.0.0.1:8080，宿主 cloudflared 不经它。
# 用法（服务器 /opt/craft-docker/）：docker compose up -d searxng
services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./deploy/searxng-settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # 海外搜索引擎出口走宿主机原生 mihomo（docker 网关 172.17.0.1，mihomo 监听 :7899）
      HTTP_PROXY: http://172.17.0.1:7899
      HTTPS_PROXY: http://172.17.0.1:7899
      NO_PROXY: localhost,127.0.0.1,::1
      SEARXNG_SECRET_KEY: change-me-in-production
