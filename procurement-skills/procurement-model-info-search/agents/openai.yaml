interface:
  display_name: "采购型号信息搜索"
  short_description: "搜索单个采购型号的公开型号信息"
  default_prompt: "使用 $procurement-model-info-search 搜索单个型号的公开资料信息。保留型号原文，勿先归一化。优先查原厂产品页、datasheet、ordering guide、授权分销商exact MPN页面。输出品牌/制造商、品类、核心规格、封装/包装/生命周期、可用搜索写法、公开资料来源链接、未确认信息、可组合用途（库存查找用型号、平台搜索用型号、供应商筛选用品牌/品类）、置信度。不能判断两个型号是否可替代；查到单个型号资料不等于它能替代另一个型号。"

runtime:
  model: "gpt-5.5"
  reasoning_effort: "low"

policy:
  allow_implicit_invocation: true
