interface:
  display_name: "采购/报价型号差异判断"
  short_description: "判断采购型号与报价型号差异是否影响使用"
  default_prompt: "使用 $procurement-part-mismatch-review 处理采购型号与报价型号不一致的问题。执行模型建议 gpt-5.5，reasoning low，单用例 2 分钟上限。先读主 SKILL.md，再按需要读取 references/search-workflow.md、references/decision-rules.md、references/output-format.md。默认输入的两个型号都是业务给定型号；查公开资料的目标不是验证型号真假，而是定位型号差异、解释差异含义、判断报价型号是否覆盖采购型号。打开原厂/订货说明/替代说明/规格页/授权渠道页面，记录查到了什么、没查到什么、哪些页面打不开，再给业务结论。最终给用户的汇报只能用业务语言：结论、处理建议、采购型号、报价型号、差异、查到的资料、没查到的关键材料、不足类型、还需要补什么、置信度。业务结论只收敛为两类：不影响使用 / 影响使用。不要把资料不足写成第三种业务结论；资料不足必须细化为：差异资料不足 / 关系证据不足 / 使用条件不足。不能把单边规格资料当作可替代证据；证明不了报价型号覆盖采购型号时，结论写影响使用，并说明不足类型和补料动作。"

runtime:
  model: "gpt-5.5"
  reasoning_effort: "low"
  per_case_time_limit_seconds: 120

policy:
  allow_implicit_invocation: true
