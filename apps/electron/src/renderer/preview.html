<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' http://localhost:8097; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: file:; connect-src 'self' https: ws://localhost:8097 http://localhost:8097; font-src 'self' https://fonts.gstatic.com;">
  <title>Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="margin: 0;">
  <script>
    // Determine theme: First check URL param (passed from main window), then localStorage, then system.
    // This runs synchronously before React mounts to prevent flash of wrong theme.
    // ThemeContext will take over theme management after React hydrates.
    (function() {
      var isDark;

      // Priority 1: Check URL param from main window
      // This ensures preview windows match the app's resolved theme (not re-evaluating system preference)
      var urlParams = new URLSearchParams(window.location.search);
      var themeParam = urlParams.get('theme');

      if (themeParam === 'dark') {
        isDark = true;
      } else if (themeParam === 'light') {
        isDark = false;
      } else {
        // Priority 2: Fall back to localStorage (for backwards compatibility or direct navigation)
        var stored = null;
        try {
          // Theme is stored at 'craft-theme' key (see lib/local-storage.ts KEYS.theme with PREFIX)
          var raw = localStorage.getItem('craft-theme');
          if (raw) stored = JSON.parse(raw);
        } catch (e) {}

        var mode = stored && stored.mode;

        if (mode === 'dark') {
          isDark = true;
        } else if (mode === 'light') {
          isDark = false;
        } else {
          // mode is 'system' or undefined - use system preference
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
      }

      // Apply class to HTML element (ThemeContext will sync this after React mounts)
      document.documentElement.classList.add(isDark ? 'dark' : 'light');
      // Set body background to prevent flash (must match CSS --background values in index.css)
      document.body.style.backgroundColor = isDark ? '#302f33' : '#faf9fb';
    })();

    // React DevTools - only in development
    if (location.protocol === 'file:' || location.hostname === 'localhost') {
      var s = document.createElement('script');
      s.src = 'http://localhost:8097';
      document.head.appendChild(s);
    }
  </script>
  <div id="root"></div>
  <script type="module" src="./preview-main.tsx"></script>
</body>
</html>
